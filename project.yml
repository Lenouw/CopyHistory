name: CopyHistory
options:
  bundleIdPrefix: com.florianbonin
  deploymentTarget:
    macOS: "14.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  CopyHistory:
    type: application
    platform: macOS
    sources:
      - path: CopyHistory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.florianbonin.CopyHistory
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: CopyHistory/CopyHistory.entitlements
        INFOPLIST_FILE: CopyHistory/Info.plist
        MARKETING_VERSION: "1.1.3"
        CURRENT_PROJECT_VERSION: "6"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
